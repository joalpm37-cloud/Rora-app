name: Deploy Backend to Cloud Run

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  PROJECT_ID: rora-app-d98e6
  REGION: us-central1
  SERVICE_NAME: rora-backend
  AR_REPOSITORY: rora-repo

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate with Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCP
        run: gcloud auth configure-docker ${REGION}-docker.pkg.dev --quiet

      - name: Build and Push Docker image
        run: |
          IMAGE_URL="${REGION}-docker.pkg.dev/${PROJECT_ID}/${AR_REPOSITORY}/${SERVICE_NAME}:${{ github.sha }}"
          docker build -t $IMAGE_URL ./server
          docker push $IMAGE_URL
          echo "IMAGE_URL=$IMAGE_URL" >> $GITHUB_ENV

      - name: Prepare Base64 Secret
        id: prepare_secrets
        run: |
          # Codificar el JSON a Base64 de forma limpia (sin saltos de línea al final ni intermedios)
          B64_JSON=$(echo -n '${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}' | base64 -w 0)
          echo "FIREBASE_B64=$B64_JSON" >> $GITHUB_ENV

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE_URL }}
          flags: "--port=8080 --allow-unauthenticated"
          env_vars: |
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            GHL_PIT_TOKEN=${{ secrets.GHL_PIT_TOKEN }}
            GHL_LOCATION_ID=${{ secrets.GHL_LOCATION_ID }}
            FIREBASE_SERVICE_ACCOUNT_JSON=${{ env.FIREBASE_B64 }}
