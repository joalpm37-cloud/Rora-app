name: Deploy Backend to Cloud Run

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  PROJECT_ID: rora-app-d98e6
  REGION: us-central1
  SERVICE_NAME: rora-backend
  AR_REPOSITORY: rora-repo

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate with Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCP
        run: gcloud auth configure-docker ${REGION}-docker.pkg.dev --quiet

      - name: Build and Push Docker image
        run: |
          IMAGE_URL="${REGION}-docker.pkg.dev/${PROJECT_ID}/${AR_REPOSITORY}/${SERVICE_NAME}:${{ github.sha }}"
          docker build -t $IMAGE_URL ./server
          docker push $IMAGE_URL
          echo "IMAGE_URL=$IMAGE_URL" >> $GITHUB_ENV

      - name: Deploy to Cloud Run (Direct GCloud)
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.IMAGE_URL }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --port 8080 \
            --allow-unauthenticated \
            --update-env-vars="^@@@^GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}@@@GHL_PIT_TOKEN=${{ secrets.GHL_PIT_TOKEN }}@@@GHL_LOCATION_ID=${{ secrets.GHL_LOCATION_ID }}@@@FIREBASE_SERVICE_ACCOUNT_JSON=${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}" \
            --update-labels="managed-by=github-actions,commit-sha=${{ github.sha }}"
