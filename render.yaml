services:
  - type: web
    name: rora-backend
    runtime: node
    rootDirectory: .
    buildCommand: npm install
    startCommand: npm run start:backend
    plan: free
    region: ohio # US-East (US IP as requested)
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false # Set in Render Dashboard
      - key: GHL_PIT_TOKEN
        sync: false # Set in Render Dashboard
      - key: GHL_LOCATION_ID
        sync: false # Set in Render Dashboard
      - key: FIREBASE_CONFIG
        sync: false # Set in Render Dashboard
